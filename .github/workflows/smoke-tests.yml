name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke-tests:
    name: Selenium Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome installation
        run: google-chrome --version || chrome --version

      - name: Run smoke tests
        run: mvn clean test "-DsuiteXmlFile=src/test/resources/smoke-tests.xml" "-Dheadless=true"

      - name: Upload failed test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            target/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 7
